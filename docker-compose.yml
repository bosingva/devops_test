version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  app:
    build:
      context: ./app
    container_name: app
    networks:
      - app-network
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    container_name: worker
    networks:
      - app-network
    volumes:
      - ./logs:/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_DIR=/logs
    depends_on:
      redis:
        condition: service_healthy

networks:
  app-network:
    driver: bridge